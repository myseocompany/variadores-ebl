  <style>
    :root {
      --bg-start: #f2f8f7;
      --bg-end: #09303f;
      --card-border: rgba(255, 255, 255, 0.2);
      --text-main: #0f172a;
      --text-muted: #334155;
      --button-bg: #000000;
      --button-hover: #0f2f3a;
      --white: #ffffff;
      --ok: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    .card {
      width: min(100%, 640px);
      border: 1px solid var(--card-border);
      background: var(--white);
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(2, 6, 23, 0.35);
      padding: 40px 28px;
      text-align: center;
    }

    .check {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 999px;
      background: rgba(22, 163, 74, 0.12);
      display: grid;
      place-items: center;
      color: var(--ok);
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--text-main);
      font-size: clamp(28px, 4vw, 36px);
      line-height: 1.2;
    }

    p {
      margin: 0 0 30px;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--button-bg);
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      padding: 12px 24px;
      transition: background-color 0.2s ease;
    }

    .btn:hover {
      background: var(--button-hover);
    }
  </style>
</head>

  <!-- Google Tag Manager (noscript) -->

  <main class="card">
    <div class="check" aria-hidden="true">✓</div>
    <h1>Datos enviados correctamente</h1>
    <p>
      Gracias por tu solicitud. Un asesor se pondrá en contacto contigo muy pronto.
    </p>
    <a class="btn" href="/">Volver al inicio</a>
  </main>
</body>
